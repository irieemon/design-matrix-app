name: Integration Tests (Supabase)

# ============================================================================
# TRIGGER CONFIGURATION
# ============================================================================
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
# Well-known Supabase local development defaults (D-09).
# These keys are intentionally public — documented by Supabase for local dev.
# The DB is ephemeral and destroyed after each CI run (D-08).
env:
  NODE_VERSION: '20.x'
  CI: 'true'
  CI_SUPABASE: 'true'
  VITE_SUPABASE_URL: 'http://localhost:54321'
  VITE_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0'
  SUPABASE_SERVICE_ROLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU'
  # NOTE: VITE_CSP_DISABLED bypasses the vite.config.ts CSP middleware so the
  # Supabase client can reach http://localhost:54321 from the dev server.
  # localhost:54321 is a different port from the dev server (3003), so it is
  # NOT covered by 'self' under CSP (different port = different origin).
  VITE_CSP_DISABLED: 'true'

# ============================================================================
# CONCURRENCY CONTROL
# ============================================================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================================
# JOBS
# ============================================================================
jobs:
  integration-tests:
    name: Integration Tests (Supabase)
    runs-on: ubuntu-latest
    # Generous timeout: Supabase Docker pull + startup on cold CI runner
    # can take 3-5 min; tests add another 5-10 min (D-03, Pitfall 3).
    timeout-minutes: 30

    steps:
      # ------------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # 2. Supabase CLI (official action, required before supabase start)
      # ------------------------------------------------------------------------
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ------------------------------------------------------------------------
      # 3. Node.js with npm cache
      # ------------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ------------------------------------------------------------------------
      # 4. Install npm dependencies
      # ------------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------------------------------
      # 5. Start ephemeral Supabase instance
      #
      # -x flags exclude services not needed by tests, saving ~1-2 min startup
      # and ~2 GB RAM on the CI runner (D-01, D-03).
      # supabase start automatically:
      #   - Applies all migrations in supabase/migrations/ (D-04)
      #   - Seeds from supabase/seed.sql after migrations complete (D-04)
      # ------------------------------------------------------------------------
      - name: Start Supabase
        run: supabase start -x studio,imgproxy,vector,logflare,supavisor,edge-runtime

      # ------------------------------------------------------------------------
      # 6. Generate JWT access tokens at runtime
      #
      # Integration tests (phase05.3-migrations.integration.test.ts) authenticate
      # the Supabase anon client via Authorization: Bearer {token}.
      # Tokens are generated dynamically so exp is always 1 hour from now —
      # hardcoded tokens with a fixed exp would eventually expire (Pitfall 6).
      #
      # JWT secret: well-known Supabase local default (D-09).
      # Payload: sub (user UUID), role/aud "authenticated", iss "supabase-demo".
      # ------------------------------------------------------------------------
      - name: Generate JWT access tokens
        run: |
          node -e "
          const crypto = require('crypto');
          const secret = 'super-secret-jwt-token-with-at-least-32-characters-long';
          function makeJwt(sub) {
            const header = Buffer.from(JSON.stringify({alg:'HS256',typ:'JWT'})).toString('base64url');
            const now = Math.floor(Date.now()/1000);
            const payload = Buffer.from(JSON.stringify({sub,role:'authenticated',aud:'authenticated',iss:'supabase-demo',exp:now+3600,iat:now})).toString('base64url');
            const sig = crypto.createHmac('sha256',secret).update(header+'.'+payload).digest('base64url');
            return header+'.'+payload+'.'+sig;
          }
          const fs = require('fs');
          fs.appendFileSync(process.env.GITHUB_ENV, [
            'E2E_COLLAB_OWNER_TOKEN=' + makeJwt('11111111-1111-1111-1111-111111111111'),
            'E2E_COLLAB_USER_TOKEN=' + makeJwt('22222222-2222-2222-2222-222222222222'),
            'E2E_STRANGER_TOKEN=' + makeJwt('33333333-3333-3333-3333-333333333333')
          ].join('\n') + '\n');
          "

      # ------------------------------------------------------------------------
      # 7. Verify GoTrue can authenticate the seeded test users (diagnostic)
      #
      # Calls the password grant endpoint directly. If this step fails, the seed
      # or GoTrue config is broken — no point paying the 2+ min Playwright
      # install cost before we know auth works.
      # ------------------------------------------------------------------------
      - name: Verify auth (diagnostic)
        run: |
          echo "Testing GoTrue auth for owner@test.com..."
          RESPONSE=$(curl -s -X POST http://localhost:54321/auth/v1/token?grant_type=password \
            -H "apikey: $VITE_SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"email":"owner@test.com","password":"test-password-123"}')
          echo "$RESPONSE" | head -c 500
          echo ""
          if echo "$RESPONSE" | grep -q "access_token"; then
            echo "Auth works — got access_token"
          else
            echo "Auth FAILED — no access_token in response"
            echo "Full response: $RESPONSE"
            exit 1
          fi

      # ------------------------------------------------------------------------
      # 8. Install Playwright browsers (Chromium only per playwright.ci.config.ts)
      # ------------------------------------------------------------------------
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ------------------------------------------------------------------------
      # 9. Run E2E integration tests (Playwright)
      #
      # Runs only the 2 target files (D-06). playwright.ci.config.ts handles the
      # dev server via webServer config (npm run dev on port 3003, 120s timeout).
      # The webServer subprocess inherits process.env, so VITE_SUPABASE_URL and
      # VITE_SUPABASE_ANON_KEY from the workflow env block reach the dev server
      # automatically — no separate `npm run dev &` step needed (Q3 RESOLVED).
      # ------------------------------------------------------------------------
      - name: Run E2E integration tests (Playwright)
        run: >
          npx playwright test
          --config playwright.ci.config.ts
          tests/e2e/invite-flow.spec.ts
          tests/e2e/project-realtime-matrix.spec.ts
        env:
          E2E_OWNER_EMAIL: 'owner@test.com'
          E2E_OWNER_PASSWORD: 'test-password-123'
          E2E_INVITEE_EMAIL: 'collaborator@test.com'
          E2E_INVITEE_PASSWORD: 'test-password-123'
          E2E_PROJECT_ID: 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa'
          E2E_BASE_URL: 'http://localhost:3003'
          E2E_USER_A_EMAIL: 'owner@test.com'
          E2E_USER_A_PASSWORD: 'test-password-123'
          E2E_USER_B_EMAIL: 'collaborator@test.com'
          E2E_USER_B_PASSWORD: 'test-password-123'
          E2E_PROJECT_URL: 'http://localhost:3003/project/aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa'

      # ------------------------------------------------------------------------
      # 9. Run migration integration tests (Vitest)
      #
      # Runs only the 1 target file (D-06). E2E_COLLAB_OWNER_TOKEN,
      # E2E_COLLAB_USER_TOKEN, and E2E_STRANGER_TOKEN come from step 6 via
      # GITHUB_ENV and are automatically available to this step.
      # ------------------------------------------------------------------------
      - name: Run migration integration tests (Vitest)
        run: npx vitest run src/lib/__tests__/phase05.3-migrations.integration.test.ts
        env:
          E2E_COLLAB_OWNER_ID: '11111111-1111-1111-1111-111111111111'
          E2E_COLLAB_USER_ID: '22222222-2222-2222-2222-222222222222'
          E2E_COLLAB_PROJECT_ID: 'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa'
          E2E_STRANGER_USER_ID: '33333333-3333-3333-3333-333333333333'
          E2E_INVITE_RAW_TOKEN: 'ci-test-invite-token-1'
          E2E_INVITE_RAW_TOKEN_2: 'ci-test-invite-token-2'

      # ------------------------------------------------------------------------
      # 10. Upload test artifacts on failure
      # ------------------------------------------------------------------------
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14
